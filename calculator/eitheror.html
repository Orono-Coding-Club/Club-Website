<html>
<head>
<title>either or</title>
</head>
<body>
<canvas width="1200" height="600" id="mainCanvas"></canvas>
<p>W A S D to move, Enter to interact</p>
<a href="./main.html">calculator page</a><br>
<a href="../index.html">home page</a>
</body>
</html>
<style>
body {
    text-align: center;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
}
canvas {
    background-color: black;
}
</style>
<script>
const c = document.getElementById("mainCanvas");
const ctx = c.getContext("2d");

let fightStart = Date.now();

const updateInterval = 15;

const defaultMusic = new Audio("../Assets/eitheror/default.mp3");

// fight mode stuff
const standardDamage = 5;
const heightUI = 30;
const modes = {
    NORMAL: 0,
    FIGHT: 1,
    WIN: 2,
}

var mode = modes.NORMAL;

var playerFight = {
    x: c.width / 2 - 10,
    y: c.height / 2 - 10,
    vx: 0,
    vy: 0,
    speed: 5,
    w: 20,
    h: 20,
    health: 100,
    damageCooldown: 10,
    damageCounter: 0,
    color: "white",
    dash: 20,
}

// secondary canvas for hurt collision
const collisionC = document.createElement("canvas");
const ctxC = collisionC.getContext("2d");
collisionC.width = playerFight.w;
collisionC.height = playerFight.h;

// normal mode stuff
const playerImageSrc = ["../Assets/eitheror/player0.png", "../Assets/eitheror/player1.png", "../Assets/eitheror/player2.png", "../Assets/eitheror/player3.png", "../Assets/eitheror/player4.png", "../Assets/eitheror/player5.png", "../Assets/eitheror/player6.png", "../Assets/eitheror/player7.png", "../Assets/eitheror/player8.png", "../Assets/eitheror/player9.png"];
const playerImages = [new Image(), new Image(), new Image(), new Image(), new Image(), new Image(), new Image(), new Image(), new Image(), new Image()];
const floorImage = new Image();
floorImage.src = "../Assets/eitheror/floor.png";

const objects = [[0, 300, 0],
                 [950, 100, 5]];

const selfImage = new Image();
selfImage.src = "../Assets/eitheror/self.png";
const teacherImage = new Image();
teacherImage.src = "../Assets/eitheror/teacherface.png";
const speakers = {
    THOUGHT: 0,
    SELF: 1,
    TEACHER: 2,
    SELF_IMAGE: selfImage,
    TEACHER_IMAGE: teacherImage,
}

const dialogueStates = {
    PERSISTENT: 0,
    BEFORE_TEACHER: 1,
    AFTER_TEACHER: 2,
    AFTER_HOMEWORK: 3,
    BATHROOM: 4,
    BEGIN_FIGHT: 5,
}

let dialogueState = dialogueStates.BEFORE_TEACHER;

let dialogueBuffer = [];

let bedDialogue = [["Your bed.", speakers.THOUGHT], ["Not too much else going on here.", speakers.THOUGHT]];
let deskDialogue = [["Your desk.", speakers.THOUGHT], ["Your homework from last night is still here, mostly unfinished.", speakers.THOUGHT]];
let teacherDialogue = [["Please go get your stuff.", speakers.TEACHER]];
let homeworkDialogue = [["Your homework is still here. You grab it and stuff it into your pocket.", speakers.THOUGHT], [dialogueStates.AFTER_HOMEWORK]];
let homeworkDialogue2 = [["Not too much else going on here.", speakers.THOUGHT]];
let backpackDialogue = [["I don't need my backpack today.", speakers.SELF]];
let dialogueObjects = [[bedDialogue, 0, 340, 0, dialogueStates.BEFORE_TEACHER], [deskDialogue, 500, 400, 0, dialogueStates.BEFORE_TEACHER],
                       [teacherDialogue, 900, 100, 5, dialogueStates.AFTER_TEACHER],
                       [homeworkDialogue, 500, 400, 0, dialogueStates.AFTER_TEACHER], [homeworkDialogue2, 500, 400, 0, dialogueStates.AFTER_HOMEWORK], [backpackDialogue, 0, 340, 0, dialogueStates.AFTER_TEACHER], [backpackDialogue, 0, 340, 0, dialogueStates.AFTER_HOMEWORK]];

let treesDialogue = [["The wind whispers softly in the trees.", speakers.THOUGHT], ["This airy feeling makes you realize you forgot your backpack, but what's the point anyway? You didn't finish your homework.", speakers.THOUGHT]];
let treesDialogue2 = [["Well, what are the possible outcomes here? There's not taking your backpack, which of course means that you're not getting credit for the homework. And the teacher will probably not be happy either.", speakers.THOUGHT], ["But if you do? Well, you would probably still not get any credit.", speakers.THOUGHT], ["But maybe the teacher would be more understanding if you showed that you actually completed some of it.", speakers.THOUGHT]];
let treesDialogue3 = [["Ah whatever. You're already basically at school, so why bother?", speakers.THOUGHT]];
let teacherDialogueAuto = [["Good morning.", speakers.TEACHER], ["Hi.", speakers.SELF], ["So, uh, finish your homework?", speakers.TEACHER], ["No..", speakers.SELF], ["Do you have it?", speakers.TEACHER], ["Also no.", speakers.SELF], ["Ah, you should've brought it. I'd definitely be willing to help if you are struggling.", speakers.TEACHER], ["SEE! Should have gotten your stuff lol.", speakers.THOUGHT], ["That sounds great. Maybe I could go grab it, considering that there's still some time before class starts.", speakers.SELF], ["Good plan. Go and get your stuff.", speakers.TEACHER], [dialogueStates.AFTER_TEACHER]];
let returnDialogue = [["See? It would've made sense to bring your homework.", speakers.THOUGHT], ["This is what happens when you try to boil down a complex situation to just a few outcomes.", speakers.THOUGHT], ["You might still have some water left, the essence of the situation, but you lose most of it.", speakers.THOUGHT]];
let returnDialogue2 = [["This is an awfully long walk.", speakers.SELF], ["I guess I'm not helping by talking.", speakers.SELF], ["(How did he know that?)", speakers.THOUGHT]];
let teacherDialogueAuto2 = [["Thank you for getting your homework.", speakers.TEACHER], ["Sorry about that.", speakers.SELF], ["It's ok. So what were you having trouble with?", speakers.TEACHER], ["Question 3 was tough.", speakers.SELF], ["Ok, let's take a look. So the question is asking for the inverse of matrix A, where A is a 2x2 matrix with entries 1, 0, 0, 0. What was your approach to this?", speakers.TEACHER], ["Well, I used the inverse formula for 2x2 matrices, but I got stuck when I got to a point where I had to divide by zero.", speakers.SELF], ["Do you remember what that means?", speakers.TEACHER], ["No, so I thought the question must be wrong.", speakers.SELF], ["Actually, if you get an undefined answer, that means there is no inverse.", speakers.TEACHER], ["Ohh, now I remember.", speakers.SELF], ["Why was I being so limiting in my thought process? Maybe I need to rethink some things.", speakers.THOUGHT], ["Thank you for explaining. Can I go to the bathroom please?", speakers.SELF], ["IDK, can you?", speakers.TEACHER], ["Haha, I'm justing kidding. Go ahead.", speakers.TEACHER], ["Thank you.", speakers.SELF], [dialogueStates.BATHROOM]];
let bathroomDialogue = [["It's weird how I keep trying to force these situations into binaries.", speakers.THOUGHT], ["Maybe I need to confront my ways of thinking.", speakers.THOUGHT], [dialogueStates.BEGIN_FIGHT]];
let autoDialogueObjects = [[treesDialogue, 800, 100, 1, dialogueStates.BEFORE_TEACHER],
                           [treesDialogue2, 800, 100, 2, dialogueStates.BEFORE_TEACHER],
                           [treesDialogue3, 800, 100, 3, dialogueStates.BEFORE_TEACHER],
                           [teacherDialogueAuto, 900, 100, 5, dialogueStates.BEFORE_TEACHER],
                           [returnDialogue, 300, 100, 4, dialogueStates.AFTER_TEACHER],
                           [returnDialogue2, 300, 100, 2, dialogueStates.AFTER_TEACHER],
                           [teacherDialogueAuto2, 900, 100, 5, dialogueStates.AFTER_HOMEWORK],
                           [bathroomDialogue, 450, 100, 4, dialogueStates.BATHROOM]];

for(let i = 0; i < autoDialogueObjects.length; i++) {
    autoDialogueObjects[i].push(false);
}

let attacks = [];
let fightText = [];
const groundHeight = 170;
let images = [["../Assets/eitheror/bedroomwall.png", 0, 0, c.width, c.height - 80, 0], ["../Assets/eitheror/floor.png", 0, c.height - groundHeight, c.width, groundHeight, 0], ["../Assets/eitheror/backpack.png", 250, 350, 70, 110, 0], ["../Assets/eitheror/bed.png", 10, 340, 280, 150, 0], ["../Assets/eitheror/door.png", c.width - 230, 120, 264, 420, 0], ["../Assets/eitheror/desk.png", 500, 290, 400, 200, 0],
                ["../Assets/eitheror/trees.jpg", 0, 0, c.width, c.height, 1],
                ["../Assets/eitheror/trees2.jpg", 0, 0, c.width, c.height, 2],
                ["../Assets/eitheror/trees3.png", 0, 0, c.width, c.height, 3],
                ["../Assets/eitheror/hallway.jpg", 0, 0, c.width, c.height, 4],
                ["../Assets/eitheror/classroom.png", 0, 0, c.width, c.height, 5], ["../Assets/eitheror/teacher.png", 1000, 180, 100, 350, 5]];

const imagesForeground = [["../Assets/eitheror/treesforeground.png", 0, 0, c.width, c.height, 1],
                          ["../Assets/eitheror/hallwayforeground.png", 0, 0, c.width, c.height, 4],
                          ["../Assets/eitheror/classroomforeground.png", 0, 0, c.width, c.height, 5]];

var room = 0;
var fade = false;
var fadeStage = 0;
const maxFadeStage = 10;
var fadeOperation;

const attackDirections = {
    RIGHT: 0,
    LEFT: 1,
    DOWN: 2,
    UP: 3,
}

var player = {
    x: 310,
    px: 310,
    y: 180,
    w: 100,
    h: 350,
    vx: 0,
    vy: 0,
    speed: 5,
    image: 0,
    images: [],
    inControl: true,
    walkCycleInterval: 4,
    walkCycleCounter: 0,
    facing: "right",
    inDialogue: false,
    dialogueCounter: 0,
}

dialogueBoxWidth = 800
const dialogueBox = {
    x: 10,
    y: 25,
    w: dialogueBoxWidth,
    h: 175,
    left: (c.width - dialogueBoxWidth) / 2,
    top: c.height / 2 + 100,
    font: "20px Verdana",
    border: 4,
    borderColor: "white",
}

for(var i = 0; i < playerImages.length; i++) {
    playerImages[i].src = playerImageSrc[i];
    player.images.push(playerImages[i]);
}

function takeControl() {
    player.inControl = false;
    player.vx = 0;
}

function walkCycle() {
    if(player.vx != 0) {
        player.walkCycleCounter++;
        if(player.walkCycleCounter >= player.walkCycleInterval) {
            player.walkCycleCounter = 0;
            player.image++;
            if(player.image >= player.images.length) {
                player.image = 0;
            }
        }
    }
}

function collision() {
    for(var i = 0; i < objects.length; i++) {
        let object = objects[i];
        for(var j = player.x; j < player.x + player.w; j++) {
            if(j > object[0] && j < object[0] + object[1] && room == object[2]) {
                player.x = player.px;
                player.vx = 0;
                player.image = 0;
            }
        }
    }
}

function continueDialogue() {
    if(player.inDialogue) {
        player.dialogueCounter++
        if(player.dialogueCounter >= dialogueBuffer.length) {
            dialogueBuffer = [];
            player.dialogueCounter = 0;
            player.inControl = true;
            player.inDialogue = false;
        }
    } else {
        for(let i = 0; i < dialogueObjects.length; i++) {
            let object = dialogueObjects[i];
            if(object[4] == dialogueState && object[3] == room) {
                if((player.x >= object[1] && player.x <= object[1] + object[2]) || (player.x + player.w >= object[1] && player.x + player.w <= object[1] + object[2])) {
                    player.inDialogue = true;
                    takeControl();
                    if(object[0][object[0].length - 1].length == 1) {
                        dialogueState = object[0][object[0].length - 1][0];
                        object[0].pop();
                    }
                    dialogueBuffer = object[0];
                    break;
                }
            }
        }
    }
}

function autoDialogue() {
    for(let i = 0; i < autoDialogueObjects.length; i++) {
        let object = autoDialogueObjects[i];
        if(object[4] == dialogueState && !object[5] && object[3] == room) {
            if((player.x >= object[1] && player.x <= object[1] + object[2]) || (player.x + player.w >= object[1] && player.x + player.w <= object[1] + object[2])) {
                player.inDialogue = true;
                takeControl();
                if(object[0][object[0].length - 1].length == 1) {
                    dialogueState = object[0][object[0].length - 1][0];
                    object[0].pop();
                }
                dialogueBuffer = object[0];
                autoDialogueObjects[i][5] = true;
                break;
            }
        }
    }
}

function roomChange() {
    if(player.x + player.w >= c.width) {
        room++;
        player.x = 10;
        fade = true;
    } else if(player.x < 0) {
        room--;
        player.x = c.width - player.w - 10;
        fade = true;
    }
}

function doFade() {
    if(fade == true) {
        takeControl();
        if(fadeStage == maxFadeStage) {
            fadeOperation = "decrease";
        } else if(fadeStage == 0) {
            fadeOperation = "increase";
        }

        if(fadeOperation == "decrease") {
            fadeStage--;
            if(fadeStage <= 0) {
                fade = false;
            }
        } else {
            fadeStage++;
        }
    } else if(!player.inDialogue) {
        player.inControl = true;
    }
}

document.onkeydown = (e) => {
    if(mode == modes.NORMAL) {
        if(player.inControl) {
            switch(e.code) {
                case "KeyA":
                    player.vx = -player.speed;
                    player.facing = "left";
                break;
                case "KeyD":
                    player.vx = player.speed;
                    player.facing = "right";
                break;
                case "Enter":
                    continueDialogue();
                break;
            }
        } else {
            switch(e.code) {
                case "Enter":
                    continueDialogue();
                break;
            }
        }
    } else {
        switch(e.code) {
            case "KeyA":
                playerFight.vx = -playerFight.speed;
            break;
            case "KeyD":
                playerFight.vx = playerFight.speed;
            break;
            case "KeyW":
                playerFight.vy = -playerFight.speed;
            break;
            case "KeyS":
                playerFight.vy = playerFight.speed;
            break;
            case "Enter":
                playerFight.x += playerFight.vx * playerFight.dash;
                playerFight.y += playerFight.vy * playerFight.dash;
            break;
        }
    }
}

document.onkeyup = (e) => {
    if(mode == modes.NORMAL) {
        if(player.inControl) {
            switch(e.code) {
                case "KeyA":
                    player.vx = 0;
                break;
                case "KeyD":
                    player.vx = 0;
                break;
            }

            player.image = 0;
        }
    } else {
        switch(e.code) {
            case "KeyA":
                playerFight.vx = 0;
            break;
            case "KeyD":
                playerFight.vx = 0;
            break;
            case "KeyW":
                playerFight.vy = 0;
            break;
            case "KeyS":
                playerFight.vy = 0;
            break;
        }
    }
}

setInterval(update, updateInterval);

function wallCollision() {
    if(playerFight.x < 0) {
        playerFight.x = 0;
        playerFight.vx = 0;
    }
    if(playerFight.x + playerFight.w > c.width) {
        playerFight.x = c.width - playerFight.w;
        playerFight.vx = 0;
    }
    if(playerFight.y < heightUI) {
        playerFight.y = heightUI;
        playerFight.vy = 0;
    }
    if(playerFight.y + playerFight.h > c.height) {
        playerFight.y = c.height - playerFight.h;
        playerFight.vy = 0;
    }
}

function hurtCollision() {
    if(playerFight.damageCounter <= 0) {
        ctxC.clearRect(0, 0, collisionC.width, collisionC.height);
        ctxC.drawImage(
            ctx.canvas,
            playerFight.x, playerFight.y, playerFight.w, playerFight.h,
            0, 0, playerFight.w, playerFight.h
        );

        const playerFightArea = ctxC.getImageData(0, 0, collisionC.width, collisionC.height).data;
        
        for(let i = 0; i < playerFightArea.length; i += 4) {
            if(playerFightArea[i] == 255 && playerFightArea[i + 1] == 0 && playerFightArea[i + 2] == 0) {
                playerFight.health -= standardDamage;
                playerFight.damageCounter = playerFight.damageCooldown;
                break;
            }
        }
    } else {
        playerFight.damageCounter--;
    }
    
    if(playerFight.health == 0) {
        location.reload();
    }
}

function update() {
    if(mode == modes.NORMAL) {
        player.x += player.vx;

        collision();
        roomChange();

        walkCycle();
        doFade();
        autoDialogue();

        draw();

        player.px = player.x;

        playerFight.vx = 0
        playerFight.vy = 0;

        if(player.inDialogue) {
            drawDialogue();
        } else if(dialogueState == dialogueStates.BEGIN_FIGHT) {
            beginFight();
        }
    } else if(mode == modes.FIGHT) {
        let time = Date.now() - fightStart;
        if(time >= 25000) {
            mode = modes.WIN;
        }

        playerFight.x += playerFight.vx;
        playerFight.y += playerFight.vy;

        wallCollision();
        drawFight(time);
        //hurtCollision();

        player.vx = 0;
    } else {
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.font = "30px Verdana";
        ctx.fillText("I feel better now.", 40, 40);
        ctx.fillText("You win!", 40, 140);
    }
}

function beginFight() {
    fade = true;
    mode = modes.FIGHT;
    fightStart = Date.now();
    createAttack(attackDirections.LEFT, 60, 20, 2000);
    createAttack(attackDirections.UP, 50, 40, 3000);
    createAttack(attackDirections.DOWN, 50, 60, 3000);
    createAttack(attackDirections.RIGHT, 70, 70, 4500);
    createAttack(attackDirections.UP, 50, 20, 5000);
    createAttack(attackDirections.UP, 50, 25, 5400);
    createAttack(attackDirections.UP, 50, 30, 5800);
    createAttack(attackDirections.UP, 50, 35, 6300);
    createAttack(attackDirections.UP, 50, 40, 6800);
    //createAttack(attackDirections.RIGHT, 50, 40, 7500);
    createAttack(attackDirections.LEFT, 50, 40, 8000);
    createAttack(attackDirections.RIGHT, 50, 30, 8500);
    createAttack(attackDirections.LEFT, 50, 20, 8500);
    //createAttack(attackDirections.DOWN, 50, 20, 9500);
    createAttack(attackDirections.RIGHT, 50, 20, 1000);
    createAttack(attackDirections.DOWN, 50, 20, 10000);
    createAttack(attackDirections.LEFT, 50, 35, 10500);
    createAttack(attackDirections.UP, 0, 30, 11500);
    createAttack(attackDirections.LEFT, 0, 20, 12500);
    createAttack(attackDirections.DOWN, 0, 20, 13500);
    createAttack(attackDirections.RIGHT, 80, 30, 14000);
    createAttack(attackDirections.LEFT, 0, 20, 15000);
    createAttack(attackDirections.DOWN, 0, 20, 15500);
    createAttack(attackDirections.UP, 0, 20, 16500);
    createAttack(attackDirections.RIGHT, 0, 20, 17000);
    
    createText("Press enter to dash!", c.width / 2 - 100, c.height / 2 - 50, 11500);
}

function createText(text, x, y, startTime) {
    fightText.push([text, x, y, startTime]);
}

let attackTimeFactor = 5;

function updateAttacks(time) {
    ctx.fillStyle = "red";
    ctx.globalAlpha = 1.0;
    for(let i = 0; i < attacks.length; i++) {
        let object = attacks[i];
        if(object[0] == attackDirections.LEFT) {
            for(let j = 0; j < c.height / (object[1] + object[2]); j++) {
                ctx.fillRect((time - object[3]) / attackTimeFactor, j * (object[1] + object[2]) + heightUI, object[2], object[2]);
            }
        } else if(object[0] == attackDirections.RIGHT) {
            for(let j = 0; j < c.height / (object[1] + object[2]); j++) {
                ctx.fillRect(c.width - (time - object[3]) / attackTimeFactor, j * (object[1] + object[2]) + heightUI, object[2], object[2]);
            }
        } else if(object[0] == attackDirections.UP) {
            for(let j = 0; j < c.width / (object[1] + object[2]); j++) {
                ctx.fillRect(j * (object[1] + object[2]), (time - object[3]) / attackTimeFactor, object[2], object[2]);
            }
        } else {
            for(let j = 0; j < c.width / (object[1] + object[2]); j++) {
                ctx.fillRect(j * (object[1] + object[2]), c.height - (time - object[3]) / attackTimeFactor, object[2], object[2]);
            }
        }
    }
}

function createAttack(direction, spacing, thickness, startTime) {
    attacks.push([direction, spacing, thickness, startTime]);
}

function drawFight(time) {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.globalAlpha = 1.0;
    
    ctx.fillStyle = playerFight.color;
    ctx.fillRect(playerFight.x, playerFight.y, playerFight.w, playerFight.h);

    updateAttacks(time);

    ctx.fillStyle = "white";
    ctx.font = "30px Verdana";
    for(let i = 0; i < fightText.length; i++) {
        let object = fightText[i];
        if(time < object[3] + 2000 && time > object[3]) {
            ctx.fillText(object[0], object[1], object[2]);
        }
    }

    ctx.fillStyle = "black";
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.fillRect(0, 0, c.width, heightUI);
    ctx.strokeRect(-ctx.lineWidth, 0, c.width + 2 * ctx.lineWidth, heightUI);
    ctx.fillStyle = "white";
    ctx.font = "15px Verdana";
    ctx.fillText("HEALTH: " + playerFight.health, 10, 20);
}

function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.globalAlpha = 1.0;

    ctx.fillStyle = "white";

    for(let i = 0; i < images.length; i++) {
        let image = images[i];
        if(image[5] == room) {
            const imageToDraw = new Image();
            imageToDraw.src = image[0];
            ctx.drawImage(imageToDraw, image[1], image[2], image[3], image[4]);
        }
    }

    if(player.facing == "left") {
        ctx.save();
        ctx.translate(player.x + player.w, player.y);
        ctx.scale(-1, 1);
        ctx.drawImage(player.images[player.image], 0, 0);
        ctx.restore();
    } else {
        ctx.drawImage(player.images[player.image], player.x, player.y);
    }

    for(let i = 0; i < imagesForeground.length; i++) {
        let image = imagesForeground[i];
        if(image[5] == room) {
            const imageToDraw = new Image();
            imageToDraw.src = image[0];
            ctx.drawImage(imageToDraw, image[1], image[2], image[3], image[4]);
        }
    }

    if(fadeStage != 0) {
        ctx.globalAlpha = fadeStage / maxFadeStage;
        ctx.globalAlpha = 1.0;
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, c.width, c.height);
    }
}

function drawDialogue() {
    ctx.clearRect(dialogueBox.left, dialogueBox.top, dialogueBox.w, dialogueBox.h);
    ctx.font = dialogueBox.font;
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.fillStyle = "white";
    let text = dialogueBuffer[player.dialogueCounter][0];
    let speaker = dialogueBuffer[player.dialogueCounter][1];

    ctx.strokeRect(dialogueBox.left, dialogueBox.top, dialogueBox.w, dialogueBox.h);

    if(speaker == speakers.THOUGHT) {
        wrapText(text, dialogueBox.left + dialogueBox.x, dialogueBox.top + dialogueBox.y, dialogueBox.w - 20, parseFloat(ctx.font.match(/\d+/)[0]) + 6);
    } else if(speaker == speakers.SELF) {
        ctx.drawImage(speakers.SELF_IMAGE, dialogueBox.left + dialogueBox.x, dialogueBox.top + 10);
        wrapText(text, dialogueBox.left + dialogueBox.x + 165, dialogueBox.top + dialogueBox.y, dialogueBox.w - 185, parseFloat(ctx.font.match(/\d+/)[0]) + 6);
    } else if(speaker == speakers.TEACHER) {
        ctx.drawImage(speakers.TEACHER_IMAGE, dialogueBox.left + dialogueBox.x, dialogueBox.top + 10);
        wrapText(text, dialogueBox.left + dialogueBox.x + 165, dialogueBox.top + dialogueBox.y, dialogueBox.w - 185, parseFloat(ctx.font.match(/\d+/)[0]) + 6);
    }
}

function wrapText(text, x, y, maxWidth, lineHeight) {
    let words = text.split(' ');
    let line = '';

    for (let i = 0; i < words.length; i++) {
        let testLine = line + words[i] + ' ';
        let metrics = ctx.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && i > 0) {
            ctx.fillText(line, x, y);
            line = words[i] + ' ';
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    ctx.fillText(line, x, y);
}
</script>
